services:
  - type: web
    name: nutino-server
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: NEWS_API_KEY
        sync: false
